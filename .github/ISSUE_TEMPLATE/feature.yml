name: Feature
description: A concrete, deliverable piece of functionality.
title: "[Feature] "
labels: ["type/feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should the system do? In user terms where possible.
    validations:
      required: true
  - type: input
    id: epic
    attributes:
      label: Parent epic
      description: Link the epic this belongs to (e.g. #12).
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Observable conditions that must hold for this to be "done".
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes / open questions
